AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1  # JRuby 9.4 targets Ruby 3.1
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'ext/zsv/vendor/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'
    - 'ext/**/*'

# Disable argument forwarding rules - JRuby 9.4 doesn't support ** syntax
Style/ArgumentsForwarding:
  Enabled: false

Naming/BlockForwarding:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Style/ClassAndModuleChildren:
  EnforcedStyle: nested

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'lib/zsv/java/**/*'  # JRuby fallback parser needs longer methods

Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'lib/zsv/java/**/*'  # JRuby fallback parser needs complex logic

Metrics/ClassLength:
  Exclude:
    - 'lib/zsv/java/**/*'  # JRuby Parser is a full implementation

Metrics/CyclomaticComplexity:
  Exclude:
    - 'lib/zsv/java/**/*'  # Parser logic is inherently complex

Metrics/PerceivedComplexity:
  Exclude:
    - 'lib/zsv/java/**/*'  # Parser logic is inherently complex

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'benchmark/**/*'
    - '**/*.gemspec'
    - 'lib/zsv/java/**/*'  # JRuby parser implementation

Metrics/BlockNesting:
  Exclude:
    - 'lib/zsv/java/**/*'  # Parser nesting is needed

Style/MapIntoArray:
  Exclude:
    - 'lib/zsv/java/**/*'  # Keep explicit iteration for clarity

Gemspec/DevelopmentDependencies:
  Enabled: false

Gemspec/RequireMFA:
  Enabled: false
